name: Build CET Zhisheng APK

# Trigger on push to main or manual dispatch
on:
  push:
    branches: [main, master]
    paths:
      - 'mobile_main.py'
      - 'core/**'
      - 'database/**'
      - 'buildozer.spec'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Build mode'
        required: true
        type: choice
        default: debug
        options:
          - debug
          - release

jobs:
  build:
    name: Build APK (${{ github.event.inputs.mode || 'debug' }})
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential git ffmpeg \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev \
            libsdl2-ttf-dev libportmidi-dev libswscale-dev \
            libavformat-dev libavcodec-dev zlib1g-dev \
            openjdk-17-jdk unzip zip \
            autoconf automake libtool pkg-config \
            cmake

      - name: Install buildozer + cython
        run: |
          pip install --upgrade buildozer cython

      - name: Build APK
        run: |
          yes | buildozer android ${{ github.event.inputs.mode || 'debug' }}

      - name: List APK output
        run: |
          echo "## APK Output" >> $GITHUB_STEP_SUMMARY
          ls -lh bin/*.apk 2>/dev/null | tee -a $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Total APK count: $(ls bin/*.apk 2>/dev/null | wc -l)" >> $GITHUB_STEP_SUMMARY

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cet-zhisheng-apk-${{ github.event.inputs.mode || 'debug' }}
          path: .buildozer/bin/*.apk
          if-no-files-found: error
          retention-days: 30

  build-all-archs:
    name: Build APK (both arm64 + armv7)
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    needs: build
    if: github.event.inputs.mode == 'debug' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential git ffmpeg \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
            zlib1g-dev openjdk-17-jdk unzip zip cmake
          pip install --upgrade buildozer cython
      - name: Patch spec for both archs
        run: |
          sed -i 's/android.archs = arm64-v8a/android.archs = arm64-v8a, armeabi-v7a/' buildozer.spec
      - name: Build both
        run: |
          yes | buildozer android debug
      - name: Upload both archs
        uses: actions/upload-artifact@v4
        with:
          name: cet-zhisheng-apk-both-archs
          path: .buildozer/bin/*.apk
