name: Build CET Zhisheng APK

# Trigger on push to main or manual dispatch
on:
  push:
    branches: [main, master]
    paths:
      - 'mobile_main.py'
      - 'core/**'
      - 'database/**'
      - 'buildozer.spec'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Build mode'
        required: true
        type: choice
        default: debug
        options:
          - debug
          - release

jobs:
  build:
    name: Build APK (${{ github.event.inputs.mode || 'debug' }})
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    env:
      # Buildozer defaults to /root but GitHub Actions runners use /home/runner
      # and /root/ might not be writable. Set HOME explicitly.
      HOME: /home/runner
      BUILDOZER_HOME: /home/runner/.buildozer
      # Make sure we can write to /root/python-for-android if it exists
      ANDROIDSDK: /home/runner/.buildozer/android/platform/android-sdk
      ANDROIDNDK: /home/runner/.buildozer/android/platform/android-ndk-r25b
      ANDROIDAPI: 33
      NDKAPI: 21

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Prepare directories and fix permissions
        run: |
          # GitHub Actions runner runs as non-root. Buildozer hardcodes
          # '/root/python-for-android' and tries to stat it. Make /root
          # traversable so Path.exists() can stat the child.
          sudo chmod 755 /root || true
          # Clean up any old /root/python-for-android that might be read-only
          sudo rm -rf /root/python-for-android /root/.buildozer 2>/dev/null || true
          # Pre-create dirs to avoid permission issues
          mkdir -p /home/runner/.buildozer
          # Make sure cwd is writable
          chmod -R 777 /home/runner/.buildozer || true
          # Also chmod current dir for build artifacts
          chmod -R 777 . || true

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential git ffmpeg \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev \
            libsdl2-ttf-dev libportmidi-dev libswscale-dev \
            libavformat-dev libavcodec-dev zlib1g-dev \
            openjdk-17-jdk unzip zip \
            autoconf automake libtool pkg-config \
            cmake

      - name: Install buildozer + cython
        run: |
          pip install --upgrade buildozer cython

      - name: Build APK
        run: |
          yes | buildozer android ${{ github.event.inputs.mode || 'debug' }} 2>&1 | tee /tmp/build.log
          # Always upload the log even on failure
          echo "BUILD_LOG_END"
        continue-on-error: true

      - name: List APK output
        if: always()
        run: |
          echo "## APK Output" >> $GITHUB_STEP_SUMMARY
          ls -lh bin/*.apk 2>/dev/null | tee -a $GITHUB_STEP_SUMMARY || echo "No APK found"
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Total APK count: $(ls bin/*.apk 2>/dev/null | wc -l)" >> $GITHUB_STEP_SUMMARY

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_id }}
          path: /tmp/build.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cet-zhisheng-apk-${{ github.event.inputs.mode || 'debug' }}
          path: .buildozer/bin/*.apk
          if-no-files-found: error
          retention-days: 30

  build-all-archs:
    name: Build APK (both arm64 + armv7)
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    needs: build
    if: github.event.inputs.mode == 'debug' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential git ffmpeg \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
            zlib1g-dev openjdk-17-jdk unzip zip cmake
          pip install --upgrade buildozer cython
      - name: Patch spec for both archs
        run: |
          sed -i 's/android.archs = arm64-v8a/android.archs = arm64-v8a, armeabi-v7a/' buildozer.spec
      - name: Build both
        run: |
          yes | buildozer android debug
      - name: Upload both archs
        uses: actions/upload-artifact@v4
        with:
          name: cet-zhisheng-apk-both-archs
          path: .buildozer/bin/*.apk
